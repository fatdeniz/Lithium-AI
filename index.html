<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .lithium-gradient {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }
        .glass-panel {
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0b0b0e] text-gray-100 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar: Projects & Ions -->
    <aside class="w-72 glass-panel flex flex-col p-4 space-y-6">
        <div class="flex items-center space-x-3 px-2">
            <div class="w-10 h-10 rounded-2xl lithium-gradient flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-bolt text-black text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Lithium <span class="text-blue-400">AI</span></h1>
        </div>

        <nav class="flex-1 space-y-8 overflow-y-auto">
            <!-- Projects Section -->
            <div>
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest px-2 mb-3">Active Projects</p>
                <ul class="space-y-1">
                    <li class="bg-blue-500/10 border-l-2 border-blue-400 p-3 rounded-r-lg cursor-pointer transition-all hover:bg-blue-500/20">
                        <span class="text-sm font-medium">New and Improved Emerald</span>
                    </li>
                    <li class="p-3 rounded-lg cursor-pointer transition-all hover:bg-white/5 text-gray-400 hover:text-white">
                        <span class="text-sm font-medium">Project Z</span>
                    </li>
                </ul>
            </div>

            <!-- Ions Section -->
            <div>
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest px-2 mb-3">Available Ions</p>
                <div class="grid grid-cols-2 gap-2">
                    <button class="flex items-center space-x-2 p-2 rounded-lg bg-white/5 hover:bg-white/10 transition">
                        <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
                        <span class="text-xs uppercase">React</span>
                    </button>
                    <button class="flex items-center space-x-2 p-2 rounded-lg bg-white/5 hover:bg-white/10 transition">
                        <span class="w-2 h-2 rounded-full bg-purple-400"></span>
                        <span class="text-xs uppercase">Tailwind</span>
                    </button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative">
        <!-- Header: Modes -->
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-[#0b0b0e]/50">
            <div class="flex items-center space-x-6">
                <button class="text-blue-400 border-b-2 border-blue-400 pb-1 text-sm font-bold uppercase tracking-wider">Voltage Mode</button>
                <button class="text-gray-500 hover:text-white transition text-sm font-bold uppercase tracking-wider">Deep Thinking</button>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-black/40 rounded-full px-3 py-1 border border-white/10">
                    <span class="text-[10px] text-green-400 mr-2">●</span>
                    <span class="text-xs font-mono">STABLE_STATE</span>
                </div>
            </div>
        </header>

        <!-- Chat Output -->
        <div class="flex-1 overflow-y-auto p-8 space-y-6" id="chat-window">
            <div class="flex flex-col space-y-2 max-w-3xl">
                <div class="flex items-center space-x-2 text-blue-400">
                    <i class="fa-solid fa-microchip text-xs"></i>
                    <span class="text-[10px] font-bold uppercase">System Initialization</span>
                </div>
                <p class="text-gray-300 leading-relaxed bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5">
                    Welcome, Eren. **Voltage Mode** is active. High-frequency coding logic is ready. Which Ion shall we stabilize today?
                </p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-500"></div>
                <div class="relative glass-panel rounded-2xl p-2 flex items-end">
                    <textarea 
                        class="flex-1 bg-transparent border-none focus:ring-0 p-4 text-sm resize-none h-12 max-h-48 overflow-y-auto"
                        placeholder="Inject logic or prompt Voltage..."
                    ></textarea>
                    <button class="mb-2 mr-2 p-3 rounded-xl lithium-gradient text-black hover:scale-105 transition active:scale-95 shadow-lg shadow-blue-500/40">
                        <i class="fa-solid fa-bolt-lightning"></i>
                    </button>
                </div>
                <div class="flex justify-between mt-3 px-2">
                    <div class="flex space-x-4">
                        <span class="text-[10px] text-gray-500 hover:text-blue-400 cursor-pointer flex items-center">
                            <i class="fa-solid fa-paperclip mr-1"></i> ATTACH_PROJECT
                        </span>
                        <span class="text-[10px] text-gray-500 hover:text-blue-400 cursor-pointer flex items-center">
                            <i class="fa-solid fa-brain mr-1"></i> ACTIVATE_DEEP_THINK
                        </span>
                    </div>
                    <span class="text-[10px] text-gray-600 font-mono">v1.0.4-LITHIUM</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
